baseURL = 'https://amf3.github.io/'
languageCode = 'en-us'
title = 'Adam Faris'
publishDir = 'docs'
theme = 'PaperMod'
enableRobotsTXT = 'true'

[[menu.main]]
identifier = "search"
name = "search"
url = "search/"
weight = 10

[[menu.main]]
identifier = "articles"
name = "articles"
url = "/articles/"
weight = 20

[[menu.main]]
identifier = "about"
name = "about"
url = "/about/"
weight = 30

[[menu.main]]
identifier = "archives"
name = "archives"
url = "archives/"
weight = 40

[outputs]
home = [ "HTML", "RSS", "JSON" ]
rss = ['rss']

[params]
ShowBreadCrumbs = false
ShowShareButtons = false
ShowRssButtonInSectionTermList = true
ShowFullTextinRSS = false
mainSections = ['articles']
analytics.google.SiteVerificationTag = '6ZFu-1_Lir3DsFJP8sshXEJ1_SjtFUw9TIISOcaJh7E'
analytics.bing.SiteVerificationTag = 'C1E02AC59FE7ECBDB6D9EFB7D5E02B65'
ShowWordCount = true
env = 'production'
ShowCodeCopyButtons = true

[services.googleAnalytics]
ID = 'G-MKR06D6KGD'

[params.fuseOpts]
isCaseSensitive = false
shouldSort = true
location = 0
distance = 1000
threshold = 0.4
minMatchCharLength = 4
keys = [ "title", "permalink", "summary", "content" ]
  
[[params.socialIcons]]
name = 'rss'
url = '/index.xml'

[markup.goldmark.renderer]
unsafe = false

[related]
threshold = 20
includeNewer = true
toLower = true

# 1. Tags are now your most granular and valuable matching signals
[[related.indices]]
name = "tags"
weight = 100

# 2. Categories act as a baseline logical tie-breaker (but don't override tag matches)
[[related.indices]]
name = "categories"
weight = 30

# 3. Date keeps things fresh so newer posts bubble up when tags/categories are equal
[[related.indices]]
name = "date"
weight = 10

